<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDE Portale Librerie</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
  :root{
    --blu:#1a2d6b;
    --azzurro:#00b4e8;
    --grigio-bg:#f4f6fa;
    --grigio-line:#e1e6ee;
    --testo:#1c2331;
    --testo-lieve:#6b7488;
    --rosso:#d64545;
    --verde:#1f9d55;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--grigio-bg);color:var(--testo);position:relative;}
  body::before{
    content:"";
    position:fixed;
    top:-60%; left:-60%;
    width:220%; height:220%;
    background-image:url('pde_libra_logo.png');
    background-repeat:repeat;
    background-size:260px;
    transform:rotate(-24deg);
    opacity:.05;
    pointer-events:none;
    z-index:-1;
  }
  a{color:var(--azzurro);}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:var(--radius);padding:10px 16px;font-size:14px;font-weight:600;transition:.15s;}
  button.primary{background:var(--azzurro);color:#fff;}
  button.primary:hover{background:#0098c9;}
  button.dark{background:var(--blu);color:#fff;}
  button.dark:hover{background:#12204d;}
  button.ghost{background:transparent;color:var(--blu);border:1px solid var(--grigio-line);}
  button.ghost:hover{background:var(--grigio-bg);}
  button.small{padding:6px 10px;font-size:12px;}
  button:disabled{opacity:.5;cursor:not-allowed;}
  input,select,textarea{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--grigio-line);border-radius:8px;width:100%;background:#fff;color:var(--testo);}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--azzurro);outline-offset:1px;}
  label{font-size:12px;font-weight:600;color:var(--testo-lieve);display:block;margin-bottom:4px;}
  .field{margin-bottom:14px;}
  .hidden{display:none !important;}
  .card{background:#fff;border:1px solid var(--grigio-line);border-radius:var(--radius);padding:20px;}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
  .badge.attesa{background:#fff3cd;color:#8a6d00;}
  .badge.approvato{background:#d9f3e2;color:var(--verde);}
  .badge.bloccato{background:#fbdada;color:var(--rosso);}
  .badge.inviato{background:#e1ecff;color:#2557d6;}
  .badge.elaborato{background:#fff3cd;color:#8a6d00;}
  .badge.scaricato{background:#d9f3e2;color:var(--verde);}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a2332;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:999;max-width:90vw;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #toast.show.error{background:var(--rosso);}
  #toast.show.success{background:var(--verde);}

  /* AUTH SCREEN */
  #auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .auth-box{width:100%;max-width:420px;}
  .auth-logo{display:flex;justify-content:center;margin:0 auto 26px;}
  .auth-logo .logo-frame{background:#fff;border-radius:16px;padding:14px 22px;box-shadow:0 2px 10px rgba(26,45,107,.08);}
  .auth-logo img.main-logo{height:100px;display:block;border-radius:10px;}
  .powered-by{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--testo-lieve);letter-spacing:.02em;margin-top:20px;}
  .powered-by img{height:20px;display:block;}
  .side-powered{display:flex;align-items:center;justify-content:center;gap:6px;font-size:10px;color:#8b96bd;margin:2px 18px 18px;}
  .side-powered img{height:15px;display:block;}
  .auth-tabs{display:flex;gap:6px;margin-bottom:18px;background:#e9edf5;border-radius:10px;padding:4px;}
  .auth-tabs button{flex:1;background:transparent;color:var(--testo-lieve);}
  .auth-tabs button.active{background:#fff;color:var(--blu);box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;}
  .msg.err{background:#fbdada;color:#8a1f1f;}
  .msg.ok{background:#d9f3e2;color:#155c31;}
  .msg.info{background:#e1ecff;color:#1c3f9e;}

  /* APP LAYOUT */
  #app-screen{display:flex;min-height:100vh;}
  #sidebar{width:220px;height:100vh;position:sticky;top:0;background:var(--blu);color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
  #nav-links{overflow-y:auto;flex:1;}
  .side-logo{padding:20px 18px 4px;display:flex;justify-content:center;}
  .side-logo img{width:100%;max-width:184px;display:block;border-radius:12px;}
  #sidebar nav{flex:1;padding:0 12px;}
  #sidebar nav button{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:transparent;color:#c7cfe6;margin-bottom:4px;font-weight:500;}
  #sidebar nav button.active{background:rgba(255,255,255,.12);color:#fff;}
  #sidebar nav button:hover{background:rgba(255,255,255,.08);}
  #sidebar .who{padding:16px;font-size:12px;color:#a9b3d2;border-top:1px solid rgba(255,255,255,.12);}
  #sidebar .who b{color:#fff;display:block;font-size:13px;margin-bottom:6px;}
  #main{flex:1;padding:28px 32px;max-width:1100px;}
  h1{font-size:22px;margin:0 0 4px;color:var(--blu);}
  .subtitle{color:var(--testo-lieve);font-size:14px;margin-bottom:22px;}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;color:var(--testo-lieve);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.02em;padding:8px 10px;border-bottom:1px solid var(--grigio-line);}
  td{padding:9px 10px;border-bottom:1px solid var(--grigio-line);}
  tr:hover td{background:#fafbfd;}
  .empty{text-align:center;color:var(--testo-lieve);padding:40px 20px;font-size:14px;}

  /* SEZIONI LIBRAIO */
  .sezioni-picker{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
  .sezione-chip{padding:9px 16px;border-radius:20px;border:1px solid var(--grigio-line);background:#fff;font-size:13px;font-weight:600;color:var(--testo-lieve);cursor:pointer;}
  .sezione-chip.active{background:var(--azzurro);color:#fff;border-color:var(--azzurro);}
  .sezione-chip .scad{font-weight:400;opacity:.8;margin-left:4px;}
  .titoli-grid{display:grid;gap:10px;}
  .titolo-row{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--grigio-line);border-radius:8px;padding:12px 14px;}
  .titolo-info{flex:1;}
  .titolo-info .t{font-weight:600;font-size:14px;}
  .titolo-info .m{color:var(--testo-lieve);font-size:12.5px;}
  .qty-box{display:flex;align-items:center;gap:6px;}
  .qty-box input{width:56px;text-align:center;}
  .qty-box button{padding:5px 9px;}

  /* CARRELLO */
  #cart-fab{position:fixed;top:20px;right:28px;background:var(--blu);color:#fff;border-radius:30px;padding:12px 20px;font-weight:700;box-shadow:0 6px 18px rgba(26,45,107,.35);z-index:50;}
  #cart-panel{position:fixed;top:0;right:0;height:100vh;width:380px;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.12);z-index:100;display:flex;flex-direction:column;padding:22px;}
  #cart-panel h3{margin-top:0;}
  .cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--grigio-line);gap:8px;}
  .cart-item .n{font-size:13.5px;font-weight:600;}
  .cart-item .p{font-size:12px;color:var(--testo-lieve);}
  #cart-list{flex:1;overflow-y:auto;}

  /* CHAT */
  #chat-fab{position:fixed;bottom:24px;right:24px;background:var(--azzurro);color:#fff;border-radius:50%;width:56px;height:56px;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,180,232,.4);z-index:50;}
  #chat-fab .dot{position:absolute;top:-4px;right:-4px;background:var(--rosso);color:#fff;font-size:11px;border-radius:10px;padding:1px 6px;font-weight:700;}
  #chat-panel{position:fixed;bottom:90px;right:24px;width:340px;height:460px;background:#fff;border-radius:14px;box-shadow:0 10px 34px rgba(0,0,0,.18);z-index:100;display:flex;flex-direction:column;overflow:hidden;}
  #chat-panel .chat-head{background:var(--blu);color:#fff;padding:14px 16px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;}
  #chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;}
  .bubble{max-width:80%;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.4;}
  .bubble.libreria{background:var(--grigio-bg);align-self:flex-start;}
  .bubble.admin{background:var(--azzurro);color:#fff;align-self:flex-end;}
  .bubble .time{display:block;font-size:10px;opacity:.6;margin-top:3px;}
  #chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--grigio-line);}
  #chat-input-row input{flex:1;}

  /* ADMIN LISTE LIBRERIE per chat */
  .lib-chat-list{display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto;}
  .lib-chat-item{padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;}
  .lib-chat-item:hover{background:var(--grigio-bg);}
  .lib-chat-item.active{background:#e1ecff;}

  .modal-overlay{position:fixed;inset:0;background:rgba(15,20,35,.5);display:flex;align-items:center;justify-content:center;z-index:200;}
  .modal-box{background:#fff;border-radius:14px;padding:26px;max-width:440px;width:90%;}
  .modal-box h3{margin-top:0;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .close-x{position:absolute;top:16px;right:20px;background:transparent;color:var(--testo-lieve);font-size:20px;padding:2px 8px;}

  /* HOME LIBRAIO */
  .home-hero{margin-bottom:26px;}
  .home-tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:860px;}
  .home-tile{position:relative;overflow:hidden;border-radius:16px;padding:28px 24px;min-height:150px;display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer;color:#fff;border:none;text-align:left;transition:.18s transform,.18s box-shadow;box-shadow:0 6px 18px rgba(26,45,107,.14);}
  .home-tile:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(26,45,107,.24);}
  .home-tile .ico{font-size:32px;margin-bottom:10px;}
  .home-tile .lbl{font-size:19px;font-weight:800;letter-spacing:.01em;}
  .home-tile .sub{font-size:12.5px;font-weight:500;opacity:.85;margin-top:3px;}
  .home-tile::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 85% -10%, rgba(255,255,255,.25), transparent 55%);pointer-events:none;}
  .home-tile.t-giro{background:linear-gradient(135deg,#1a2d6b,#2e469e);}
  .home-tile.t-campagna{background:linear-gradient(135deg,#00b4e8,#0087b3);}
  .home-tile.t-proposta{background:linear-gradient(135deg,#6a4ce0,#9b7bf2);}
  .home-tile.t-storico{background:linear-gradient(135deg,#3a4356,#5c6785);}
  @media(max-width:640px){.home-tiles{grid-template-columns:1fr;}}

  /* CAMPAGNE - card banner (largo e basso) */
  .campagne-grid{display:grid;grid-template-columns:1fr;gap:16px;}
  @media(min-width:860px){.campagne-grid{grid-template-columns:1fr 1fr;}}
  .campagna-card{border:2px solid var(--grigio-line);border-radius:14px;overflow:hidden;cursor:pointer;background:#fff;transition:.15s border-color,.15s box-shadow;}
  .campagna-card:hover{box-shadow:0 4px 14px rgba(26,45,107,.14);}
  .campagna-card.active{border-color:var(--azzurro);box-shadow:0 4px 18px rgba(0,180,232,.25);}
  .campagna-card .img-wrap{width:100%;aspect-ratio:16/5;background:var(--grigio-bg);overflow:hidden;}
  .campagna-card .img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
  .campagna-card .img-wrap.noimg{display:flex;align-items:center;justify-content:center;color:var(--testo-lieve);font-size:12.5px;}
  .campagna-card .info{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
  .campagna-card .info .nome{font-weight:700;font-size:15px;color:var(--blu);}
  .campagna-card .info .scad{font-size:12px;color:var(--testo-lieve);}

  /* BANNER & LOCANDINA sezione */
  .banner-sezione{width:100%;max-height:260px;object-fit:cover;border-radius:var(--radius);margin-bottom:18px;display:block;}
  .locandina-download{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;background:#fff;border:1px solid var(--azzurro);color:var(--azzurro);border-radius:8px;text-decoration:none;font-size:13.5px;font-weight:600;margin-bottom:18px;}
  .locandina-download:hover{background:#e1f6fd;}
  .admin-materiali-row{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:12px;padding:12px;background:var(--grigio-bg);border-radius:8px;}
  .admin-materiali-item{flex:1;min-width:200px;}
  .admin-materiali-item label{margin-bottom:5px;}
  .admin-materiali-preview{font-size:12px;color:var(--testo-lieve);margin-top:5px;}
  .admin-materiali-preview a{color:var(--azzurro);}
</style>
</head>
<body>

<div id="toast"></div>

<!-- ======================= AUTH SCREEN ======================= -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-frame"><img class="main-logo" src="pde_libra_logo.png" alt="PDE Libra"></div>
    </div>
    <div class="auth-tabs">
      <button id="tab-login" class="active" onclick="switchAuthTab('login')">Accedi</button>
      <button id="tab-richiedi" onclick="switchAuthTab('richiedi')">Richiedi accesso</button>
    </div>
    <div id="auth-msg"></div>

    <div id="form-login" class="card">
      <div class="field"><label>Email</label><input id="login-email" type="email" autocomplete="username"></div>
      <div class="field"><label>Password</label><input id="login-password" type="password" autocomplete="current-password"></div>
      <button class="primary" style="width:100%" onclick="doLogin()">Accedi</button>
    </div>

    <div id="form-richiedi" class="card hidden">
      <div class="field"><label>Ragione sociale libreria *</label><input id="req-nome"></div>
      <div class="field"><label>Email *</label><input id="req-email" type="email"></div>
      <div class="grid2">
        <div class="field"><label>Città</label><input id="req-citta"></div>
        <div class="field"><label>Partita IVA</label><input id="req-piva"></div>
      </div>
      <div class="field"><label>Codice MELI (se in possesso)</label><input id="req-codcliente"></div>
      <div class="field"><label>Telefono</label><input id="req-telefono"></div>
      <div class="field"><label>Indirizzo</label><input id="req-indirizzo"></div>
      <button class="primary" style="width:100%" onclick="doRichiedi()">Invia richiesta</button>
      <p style="font-size:12px;color:var(--testo-lieve);margin-top:12px">Riceverai le credenziali da PDE dopo l'approvazione della richiesta.</p>
    </div>

    <div class="powered-by">powered by <img src="logo_pde.png" alt="PDE" onerror="this.style.display='none'"></div>
  </div>
</div>

<!-- ======================= APP SCREEN ======================= -->
<div id="app-screen" class="hidden">
  <div id="sidebar">
    <div class="side-logo"><img src="pde_libra_logo.png" alt="PDE Libra"></div>
    <div class="side-powered">powered by <img src="logo_pde.png" alt="PDE" onerror="this.style.display='none'"></div>
    <nav id="nav-links"></nav>
    <div class="who">
      <b id="who-name">-</b>
      <span id="who-role">-</span>
      <div style="margin-top:10px"><button class="ghost small" style="width:100%;color:#fff;border-color:rgba(255,255,255,.3)" onclick="doLogout()">Esci</button></div>
    </div>
  </div>
  <div id="main"></div>
</div>

<!-- CARRELLO (libraio) -->
<button id="cart-fab" class="hidden" onclick="toggleCart()">🛒 Carrello (<span id="cart-count">0</span>)</button>
<div id="cart-panel" class="hidden">
  <h3>Il tuo carrello</h3>
  <div id="cart-list"></div>
  <div style="display:flex;justify-content:space-between;align-items:baseline;padding-top:12px;border-top:1px solid var(--grigio-line);margin-top:6px">
    <span style="font-size:12px;color:var(--testo-lieve)">Totale al lordo dello sconto</span>
    <span id="cart-total" style="font-size:18px;font-weight:700;color:var(--blu)">€ 0,00</span>
  </div>
  <div style="border-top:1px solid var(--grigio-line);padding-top:14px;margin-top:10px;display:flex;gap:8px">
    <button class="ghost" style="flex:1" onclick="toggleCart()">Chiudi</button>
    <button class="primary" style="flex:1" onclick="inviaOrdine()">Invia ordine</button>
  </div>
</div>

<!-- CHAT (libraio) -->
<button id="chat-fab" class="hidden" onclick="toggleChat()">💬<span id="chat-badge" class="dot hidden">•</span></button>
<div id="chat-panel" class="hidden">
  <div class="chat-head"><span>Chat con PDE</span><button class="ghost small" style="color:#fff;border-color:rgba(255,255,255,.4)" onclick="toggleChat()">✕</button></div>
  <div id="chat-messages"></div>
  <div id="chat-input-row">
    <input id="chat-input" placeholder="Scrivi un messaggio..." onkeydown="if(event.key==='Enter')sendChatMessage()">
    <button class="primary small" onclick="sendChatMessage()">Invia</button>
  </div>
</div>

  session: null,

/* ================= UTIL ================= */
function fmtDate(d){ if(!d) return '-'; return new Date(d).toLocaleDateString('it-IT'); }
function fmtDateTime(d){ return new Date(d).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function genPassword(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';
  let p=''; for(let i=0;i<10;i++) p+=chars[Math.floor(Math.random()*chars.length)];
  return p;
}
function showMsg(el, text, type){ el.innerHTML = `<div class="msg ${type}">${text}</div>`; }
function esc(s){ return (s??'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ================= AUTH SCREEN ================= */
function switchAuthTab(tab){
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-richiedi').classList.toggle('active', tab==='richiedi');
  document.getElementById('form-login').classList.toggle('hidden', tab!=='login');
  document.getElementById('form-richiedi').classList.toggle('hidden', tab!=='richiedi');
  document.getElementById('auth-msg').innerHTML = '';
}

async function doRichiedi(){
  const nome = document.getElementById('req-nome').value.trim();
  const email = document.getElementById('req-email').value.trim();
  const msgEl = document.getElementById('auth-msg');
  if(!nome || !email){ showMsg(msgEl,'Ragione sociale ed email sono obbligatorie.','err'); return; }
  const { error } = await sb.from('librerie').insert({
    ragione_sociale: nome,
    email: email,
    cod_cliente: document.getElementById('req-codcliente').value.trim() || null,
    telefono: document.getElementById('req-telefono').value.trim() || null,
    indirizzo: document.getElementById('req-indirizzo').value.trim() || null,
    citta: document.getElementById('req-citta').value.trim() || null,
    partita_iva: document.getElementById('req-piva').value.trim() || null,
  });
  if(error){
    showMsg(msgEl, error.message.includes('duplicate') ? 'Esiste già una richiesta con questa email.' : error.message, 'err');
    return;
  }
  document.getElementById('form-richiedi').innerHTML = '<p style="text-align:center;padding:20px 0">✅ Richiesta inviata. Riceverai le credenziali da PDE dopo l\'approvazione.</p>';
}

async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const msgEl = document.getElementById('auth-msg');
  if(!email || !password){ showMsg(msgEl,'Inserisci email e password.','err'); return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ showMsg(msgEl,'Credenziali non valide.','err'); return; }
  await initSession(data.session);
}

async function doLogout(){
  await sb.auth.signOut();
  state = {...state, session:null, role:null, libreria:null, cart:[]};
  document.getElementById('app-screen').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('cart-fab').classList.add('hidden');
  document.getElementById('chat-fab').classList.add('hidden');
  closeAllFloating();
}

/* ================= SESSION / ROUTING ================= */
async function initSession(session){
  state.session = session;
  const role = session.user.user_metadata?.role === 'admin' ? 'admin' : 'libraio';
  state.role = role;
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');

  if(role === 'admin'){
    document.getElementById('who-name').textContent = session.user.email;
    document.getElementById('who-role').textContent = 'Amministratore PDE';
    renderAdminNav();
    goToAdminView('richieste');
  } else {
    const { data: lib, error } = await sb.from('librerie').select('*').eq('auth_user_id', session.user.id).maybeSingle();
    if(error || !lib){
      alert('Impossibile trovare la tua scheda libreria. Contatta PDE.');
      await doLogout();
      return;
    }
    state.libreria = lib;
    if(lib.stato !== 'approvato'){
      document.getElementById('main').innerHTML = `<div class="card" style="max-width:520px;margin-top:60px">
        <h2 style="margin-top:0">${lib.stato==='bloccato' ? 'Accesso bloccato' : 'Richiesta in attesa'}</h2>
        <p>${lib.stato==='bloccato' ? 'Il tuo accesso è stato bloccato. Contatta PDE per maggiori informazioni.' : 'La tua richiesta di accesso è in attesa di approvazione da parte di PDE. Riceverai le credenziali via email/telefono una volta approvata.'}</p>
      </div>`;
      document.getElementById('nav-links').innerHTML='';
      document.getElementById('who-name').textContent = lib.ragione_sociale;
      document.getElementById('who-role').textContent = 'In attesa';
      return;
    }
    document.getElementById('who-name').textContent = lib.ragione_sociale;
    document.getElementById('who-role').textContent = 'Libreria';
    document.getElementById('cart-fab').classList.remove('hidden');
    document.getElementById('chat-fab').classList.remove('hidden');
    renderLibraioNav();
    goToLibraioView('home');
    subscribeChat(lib.id);
  }
}

window.addEventListener('DOMContentLoaded', async () => {
  const { data } = await sb.auth.getSession();
  if(data.session) await initSession(data.session);
});

async function renderSezioneLibraio(){
  const tipo = state.sezioneTipo;
  const tabellaMap = { giro:'giri', campagna:'campagne', proposta:'proposte' };
  const { data: sezioni } = await sb.from(tabellaMap[tipo]).select('*')
    .eq('attivo', true)
    .or(`data_scadenza.is.null,data_scadenza.gte.${todayISO()}`)
    .order('created_at', { ascending:false });

  const main = document.getElementById('main');
  const titolo = tipo==='giro' ? 'Giri Vendita' : tipo==='campagna' ? 'Campagne' : 'Proposte';
  if(!sezioni || sezioni.length===0){
    main.innerHTML = `<h1>${titolo}</h1><div class="subtitle">Sezione libraio</div><div class="card empty">Nessuna sezione attiva al momento.</div>`;
    return;
  }
  const sezioneCambiata = !state.sezioneAttiva || !sezioni.find(s=>s.id===state.sezioneAttiva);
  if(sezioneCambiata){ state.sezioneAttiva = sezioni[0].id; state.catalogoPage = 1; }

  main.innerHTML = `
    <h1>${titolo}</h1>
    <div class="subtitle">${tipo==='campagna' ? 'Seleziona una campagna per vedere i titoli in promozione' : 'Seleziona una sezione e aggiungi i titoli al carrello'}</div>
    <div class="sezioni-picker" id="sezioni-picker"></div>
    <div id="materiali-sezione-libraio"></div>
    <div id="titoli-container"></div>
  `;
  if(tipo === 'campagna'){
    await renderCampagnePicker(sezioni);
  } else {
    const picker = document.getElementById('sezioni-picker');
    sezioni.forEach(s=>{
      const chip = document.createElement('div');
      chip.className = 'sezione-chip' + (s.id===state.sezioneAttiva ? ' active':'');
      chip.innerHTML = `${esc(s.nome)}${s.data_scadenza ? `<span class="scad">scad. ${fmtDate(s.data_scadenza)}</span>`:''}`;
      chip.onclick = () => { state.sezioneAttiva = s.id; state.catalogoPage = 1; renderSezioneLibraio(); };
      picker.appendChild(chip);
    });
  }
  renderMaterialiSezioneLibraio(tipo, state.sezioneAttiva);

  // ordine di inserimento (created_at), non modificabile/ordinabile dall'utente
  const { data: titoli } = await sb.from('titoli').select('*').eq('sezione_tipo', tipo).eq('sezione_id', state.sezioneAttiva).order('created_at', { ascending:true });
  state.catalogoTitoli = titoli || [];
  if(!state.catalogoEditoriSel) state.catalogoEditoriSel = [];
  if(!state.catalogoPage) state.catalogoPage = 1;
  const cont = document.getElementById('titoli-container');
  if(!titoli || titoli.length===0){ cont.innerHTML = '<div class="card empty">Nessun titolo in questa sezione.</div>'; return; }

  const editoriDisponibili = [...new Set(titoli.map(t=>t.editore).filter(Boolean))].sort();
  cont.innerHTML = `
    <div class="toolbar">
      <input id="cat-search" placeholder="Cerca per EAN, titolo, autore o editore..." style="max-width:320px" value="${esc(state.catalogoSearch||'')}" oninput="state.catalogoSearch=this.value;state.catalogoPage=1;renderCatalogoGrid()">
      <div style="position:relative">
        <button class="ghost" onclick="document.getElementById('filtro-editore-panel').classList.toggle('hidden')">🏷 Filtra editore ${state.catalogoEditoriSel.length ? `(${state.catalogoEditoriSel.length})` : ''}</button>
        <div id="filtro-editore-panel" class="hidden" style="position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid var(--grigio-line);border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.12);padding:12px;z-index:20;min-width:220px;max-height:260px;overflow-y:auto">
          ${editoriDisponibili.map(ed=>`
            <label style="display:flex;align-items:center;gap:8px;padding:5px 2px;font-size:13px;cursor:pointer">
              <input type="checkbox" value="${esc(ed)}" ${state.catalogoEditoriSel.includes(ed)?'checked':''} onchange="toggleEditoreFiltro('${esc(ed)}')"> ${esc(ed)}
            </label>
          `).join('') || '<span style="font-size:12px;color:var(--testo-lieve)">Nessun editore disponibile</span>'}
          ${state.catalogoEditoriSel.length ? `<button class="ghost small" style="width:100%;margin-top:8px" onclick="state.catalogoEditoriSel=[];state.catalogoPage=1;renderSezioneLibraio()">Azzera filtro</button>` : ''}
        </div>
      </div>
    </div>
    <div id="catalogo-grid"></div>
    <div id="catalogo-paginazione" style="display:flex;justify-content:center;align-items:center;gap:12px;margin-top:16px"></div>
  <!-- barcode input riprende focus automaticamente per scansioni rapide consecutive -->
  `;
  renderCatalogoGrid();
}
/* Card banner larghe/basse per le campagne, al posto delle pillole standard */
async function renderCampagnePicker(sezioni){
  const picker = document.getElementById('sezioni-picker');
  picker.className = 'campagne-grid';
  picker.innerHTML = sezioni.map(s => `
    <div class="campagna-card ${s.id===state.sezioneAttiva ? 'active':''}" data-id="${s.id}">
      <div class="img-wrap noimg" id="campagna-img-${s.id}">caricamento...</div>
      <div class="info">
        <span class="nome">${esc(s.nome)}</span>
        <span class="scad">${s.data_scadenza ? 'Scadenza inserimento: '+fmtDate(s.data_scadenza) : 'Nessuna scadenza'}</span>
      </div>
    </div>
  `).join('');
  picker.querySelectorAll('.campagna-card').forEach(card=>{
    card.onclick = () => { state.sezioneAttiva = card.dataset.id; state.catalogoPage = 1; renderSezioneLibraio(); };
  });
  await Promise.all(sezioni.map(async s=>{
    const m = await getMaterialiSezione('campagna', s.id);
    const box = document.getElementById(`campagna-img-${s.id}`);
    if(!box) return;
    if(m.banner){ box.classList.remove('noimg'); box.innerHTML = `<img src="${m.banner.url}" alt="${esc(s.nome)}">`; }
    else { box.innerHTML = '🖼 Nessuna immagine caricata'; }
  }));
}
function toggleEditoreFiltro(ed){
  const i = state.catalogoEditoriSel.indexOf(ed);
  if(i>=0) state.catalogoEditoriSel.splice(i,1); else state.catalogoEditoriSel.push(ed);
  state.catalogoPage = 1;
  renderCatalogoGrid();
}
const TITOLI_PER_PAGINA = 15;
function renderCatalogoGrid(){
  const isGiro = state.sezioneTipo === 'giro';
  const q = (state.catalogoSearch||'').trim().toLowerCase();
  const sel = state.catalogoEditoriSel||[];
  const filtrati = (state.catalogoTitoli||[]).filter(t=>{
    const matchQ = !q || [t.ean,t.titolo,t.autore,t.editore].some(v=>v && v.toString().toLowerCase().includes(q));
    const matchEd = sel.length===0 || sel.includes(t.editore);
    return matchQ && matchEd;
  });
  const grid = document.getElementById('catalogo-grid');
  const pagBox = document.getElementById('catalogo-paginazione');
  if(!grid) return;
  if(filtrati.length===0){ grid.innerHTML = '<div class="card empty">Nessun titolo corrisponde ai filtri.</div>'; if(pagBox) pagBox.innerHTML=''; return; }

  const totPagine = Math.max(1, Math.ceil(filtrati.length / TITOLI_PER_PAGINA));
  if(state.catalogoPage > totPagine) state.catalogoPage = totPagine;
  const start = (state.catalogoPage-1) * TITOLI_PER_PAGINA;
  const titoli = filtrati.slice(start, start + TITOLI_PER_PAGINA);

  grid.innerHTML = `<div class="titoli-grid">${titoli.map((t,idx)=>{
    const inCart = state.cart.find(c=>c.ean===t.ean);
    const qty = inCart ? inCart.quantita : 0;
    const iconaHtml = isGiro
      ? `<button class="ghost small" title="Apri PDF" onclick="window.open('${PDF_BUCKET_URL}${encodeURIComponent(t.ean)}.pdf','_blank')">📄</button>`
      : `<img src="${coverUrl(t.ean)}" alt="" style="width:38px;height:54px;object-fit:cover;border-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.25);cursor:zoom-in" onclick="mostraCopertinaGrande('${t.ean}', ${JSON.stringify(t.titolo).replace(/"/g,'&quot;')})" onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'📕',style:'font-size:26px'}))">`;
    const meta = [
      'EAN '+esc(t.ean),
      t.autore ? esc(t.autore) : null,
      t.editore ? esc(t.editore) : null,
      t.prezzo ? '€ '+Number(t.prezzo).toFixed(2) : null,
    ].filter(Boolean).join(' · ');
    const extraGemelli = t.gemelli ? 'Gemelli: '+esc(t.gemelli) : '';
    return `<div class="titolo-row">
      <div style="flex-shrink:0;width:40px;display:flex;justify-content:center">${iconaHtml}</div>
      <div class="titolo-info">
        <div class="t">${esc(t.titolo)}</div>
        <div class="m">${meta}</div>
        ${extraGemelli?`<div class="m">${extraGemelli}</div>`:''}
        ${t.note?`<button class="ghost small" style="margin-top:4px" data-titolo="${esc(t.titolo)}" data-nota="${esc(t.note)}" onclick="mostraTestoLungo(this.dataset.titolo, this.dataset.nota)">📝 Note</button>`:''}
      </div>
      <svg id="bc-riga-${idx}" data-ean="${esc(t.ean)}" class="barcode-svg" style="flex-shrink:0"></svg>
      <div style="width:70px;text-align:right;font-size:13px;font-weight:600;color:var(--blu)" id="subtot-${t.ean}">${t.prezzo?'€ '+(t.prezzo*qty).toFixed(2):''}</div>
      <div class="qty-box">
        <button class="ghost small" onclick="changeQty('${t.ean}', ${JSON.stringify(t.titolo).replace(/"/g,'&quot;')}, '${t.autore||''}', '${t.editore||''}', ${t.prezzo||0}, '${t.cedola||''}', -1)">−</button>
        <input type="number" min="0" value="${qty}" id="qty-${t.ean}" onchange="setQty('${t.ean}', ${JSON.stringify(t.titolo).replace(/"/g,'&quot;')}, '${t.autore||''}', '${t.editore||''}', ${t.prezzo||0}, '${t.cedola||''}', this.value)">
        <button class="ghost small" onclick="changeQty('${t.ean}', ${JSON.stringify(t.titolo).replace(/"/g,'&quot;')}, '${t.autore||''}', '${t.editore||''}', ${t.prezzo||0}, '${t.cedola||''}', 1)">+</button>
      </div>
    </div>`;
  }).join('')}</div>`;
  generaBarcodeVisibili(titoli);

  if(pagBox){
    pagBox.innerHTML = totPagine<=1 ? '' : `
      <button class="ghost small" ${state.catalogoPage<=1?'disabled':''} onclick="state.catalogoPage--;renderCatalogoGrid()">← Precedenti</button>
      <span style="font-size:13px;color:var(--testo-lieve)">Pagina ${state.catalogoPage} di ${totPagine} (${filtrati.length} titoli)</span>
      <button class="ghost small" ${state.catalogoPage>=totPagine?'disabled':''} onclick="state.catalogoPage++;renderCatalogoGrid()">Successivi →</button>
    `;
  }
}
function mostraCopertinaGrande(ean, titolo){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = ()=>overlay.remove();
  overlay.innerHTML = `<div style="max-width:90vw;max-height:90vh;text-align:center">
    <img src="${coverUrl(ean)}" alt="" style="max-width:100%;max-height:80vh;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.4)">
    <div style="color:#fff;margin-top:10px;font-size:14px">${esc(titolo)}</div>
  </div>`;
  document.body.appendChild(overlay);
}

/* --- SCANSIONE CODICI A BARRE (lettore fisico o fotocamera) --- */
function isEan13Valido(codice){
  if(!/^\d{13}$/.test(codice)) return false;
  const cifre = codice.split('').map(Number);
  const somma = cifre.slice(0,12).reduce((acc,c,i)=> acc + c * (i%2===0?1:3), 0);
  const checkAtteso = (10 - (somma % 10)) % 10;
  return checkAtteso === cifre[12];
}
function generaBarcodeVisibili(titoli){
  titoli.forEach((t,idx)=>{
    const el = document.getElementById('bc-riga-'+idx);
    if(!el) return;
    try{
      JsBarcode(el, t.ean, {
        format: isEan13Valido(t.ean) ? 'EAN13' : 'CODE128',
        width: 1.3,
        height: 32,
        fontSize: 10,
        margin: 2,
        displayValue: true,
      });
    }catch(e){
      console.error('Barcode non generato per EAN', t.ean, e);
      el.outerHTML = `<span style="font-size:11px;color:var(--testo-lieve)" title="${esc(e.message||'')}">Barcode non generato</span>`;
    }
  });
}

function changeQty(ean, titolo, autore, editore, prezzo, cedola, delta){
  const input = document.getElementById('qty-'+ean);
  const newVal = Math.max(0, parseInt(input.value||0) + delta);
  input.value = newVal;
  setQty(ean, titolo, autore, editore, prezzo, cedola, newVal);
}
function setQty(ean, titolo, autore, editore, prezzo, cedola, value){
  const qty = Math.max(0, parseInt(value)||0);
  state.cart = state.cart.filter(c=>c.ean!==ean);
  if(qty>0) state.cart.push({ean, titolo, autore, editore, prezzo:Number(prezzo)||0, cedola, quantita:qty});
  const subtotEl = document.getElementById('subtot-'+ean);
  if(subtotEl) subtotEl.textContent = prezzo ? '€ '+((Number(prezzo)||0)*qty).toFixed(2) : '';
  updateCartUI();
}
function updateCartUI(){
  document.getElementById('cart-count').textContent = state.cart.reduce((s,c)=>s+c.quantita,0);
  const list = document.getElementById('cart-list');
  if(state.cart.length===0){ list.innerHTML = '<p class="empty">Carrello vuoto</p>'; document.getElementById('cart-total').textContent = '€ 0,00'; return; }
  list.innerHTML = state.cart.map(c=>{
    const subtot = (c.prezzo||0) * c.quantita;
    return `<div class="cart-item">
      <div><div class="n">${esc(c.titolo)}</div><div class="p">EAN ${esc(c.ean)} · qtà ${c.quantita}${c.prezzo?' · € '+Number(c.prezzo).toFixed(2)+' cad.':''}</div></div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-weight:700;color:var(--blu);font-size:13px">${c.prezzo?'€ '+subtot.toFixed(2):''}</div>
        <button class="ghost small" onclick="setQty('${c.ean}','','','','','',0);renderSezioneLibraio()">✕</button>
      </div>
    </div>`;
  }).join('');

async function importaTitoliExcel(event, tipo, sezioneId){
  const file = event.target.files[0];
  if(!file) return;
  const statusEl = document.getElementById('import-status-'+sezioneId);
  statusEl.innerHTML = '<div class="msg info">Importazione in corso...</div>';
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type:'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });

    const norm = s => s.toString().trim().toLowerCase();
    const getVal = (row, ...keys) => {
      for(const k of Object.keys(row)){
        if(keys.includes(norm(k))) return row[k];
      }
      return '';
    };

    const daInserire = [];
    let scartate = 0;
    rows.forEach(row=>{
      const ean = getVal(row,'ean').toString().trim();
      const titolo = getVal(row,'titolo').toString().trim();
      if(!ean || !titolo){ scartate++; return; }
      daInserire.push({
        sezione_tipo: tipo,
        sezione_id: sezioneId,
        ean,
        titolo,
        autore: getVal(row,'autore').toString().trim() || null,
        editore: getVal(row,'editore').toString().trim() || null,
        prezzo: getVal(row,'prezzo') !== '' ? Number(getVal(row,'prezzo')) : null,
        note: getVal(row,'note').toString().trim() || null,
        gemelli: getVal(row,'gemelli').toString().trim() || null,
        cedola: getVal(row,'cedola').toString().trim() || null,
      });
    });

    if(daInserire.length === 0){
      statusEl.innerHTML = '<div class="msg err">Nessuna riga valida trovata (servono almeno le colonne EAN e Titolo).</div>';
      return;
    }

    const CHUNK = 500;
    for(let i=0; i<daInserire.length; i+=CHUNK){
      const { error } = await sb.from('titoli').insert(daInserire.slice(i, i+CHUNK));
      if(error){ statusEl.innerHTML = `<div class="msg err">Errore durante l'importazione: ${esc(error.message)}</div>`; return; }
    }
    statusEl.innerHTML = `<div class="msg ok">Importati ${daInserire.length} titoli${scartate?` (${scartate} righe scartate per EAN/Titolo mancante)`:''}.</div>`;
    renderTitoliAdmin(tipo, sezioneId);
  }catch(e){
    statusEl.innerHTML = `<div class="msg err">Errore lettura file: ${esc(e.message)}</div>`;
  }
  event.target.value = '';
}

/* ================= MATERIALI SEZIONE (banner + locandina) ================= */
const BUCKET_MATERIALI = 'materiali-sezione';

async function uploadMateriale(file, sezioneTipo, sezioneId, tipo){
  const estensione = file.name.split('.').pop();
  const path = `${sezioneTipo}/${sezioneId}/${tipo}.${estensione}`;
  const { error: uploadError } = await sb.storage.from(BUCKET_MATERIALI).upload(path, file, { upsert:true });
  if(uploadError) throw uploadError;
  const { data:{ publicUrl } } = sb.storage.from(BUCKET_MATERIALI).getPublicUrl(path);
  const { error: dbError } = await sb.from('materiali_sezione').upsert({
    sezione_tipo: sezioneTipo, sezione_id: sezioneId, tipo,
    url: publicUrl, nome_file: file.name, updated_at: new Date().toISOString()
  }, { onConflict: 'sezione_tipo,sezione_id,tipo' });
  if(dbError) throw dbError;
  return publicUrl;
}
async function getMaterialiSezione(sezioneTipo, sezioneId){
  const { data } = await sb.from('materiali_sezione').select('*').eq('sezione_tipo', sezioneTipo).eq('sezione_id', sezioneId);
  const result = { banner:null, locandina:null };
  (data||[]).forEach(m => result[m.tipo] = m);
  return result;
}

  if(mostraBanner){
    document.getElementById('preview-banner-'+sezioneId).innerHTML = m.banner
      ? `<a href="${m.banner.url}" target="_blank">banner attuale ✓</a> · <button class="ghost small" onclick="rimuoviMateriale('${sezioneTipo}','${sezioneId}','banner')">rimuovi</button>`

    document.getElementById('preview-locandina-'+sezioneId).innerHTML = m.locandina
      ? `<a href="${m.locandina.url}" target="_blank">${esc(m.locandina.nome_file)} ✓</a> · <button class="ghost small" onclick="rimuoviMateriale('${sezioneTipo}','${sezioneId}','locandina')">rimuovi</button>`

    });

    document.getElementById('input-locandina-'+sezioneId).addEventListener('change', async (e)=>{
      const file = e.target.files[0]; if(!file) return;
      try{ await uploadMateriale(file, sezioneTipo, sezioneId, 'locandina'); renderAdminMaterialiBox(sezioneTipo, sezioneId); }
      catch(err){ alert('Errore upload locandina: '+err.message); }
    });

function esportaExcel(rows, filename){

/* ---- Caricamento diretto su RPN (via rpn-sync, stesso endpoint di BookUp) ---- */
function buildRpnFile(ordini){
  const rows = buildExportRows(ordini);
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  const buf = XLSX.write(wb, { type:'array', bookType:'xlsx' });
  return new File([buf], 'ordini_rpn.xlsx', { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
}
async function rpnUploadFile(path, file){
  const { data: { session } } = await sbRpn.auth.getSession();
  if(!session) throw new Error('Sessione RPN non attiva: accedi prima con il tuo account BookUp.');
  const fd = new FormData();
  fd.append('csv_file', file);
  const res = await fetch(`${RPN_PROXY_BASE}/${path}`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${session.access_token}` },
    body: fd,
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok){
    const err = new Error(data.message || data.error || `Errore ${res.status}`);
    err.status = res.status; err.payload = data;
    throw err;
  }
  return data;
}
function pickRpnRowFields(r){
  const ean = r.ean ?? r.EAN ?? r.ean13 ?? '';
  const libreria = r.libraryCode ?? r.codiceCliente ?? r.libreria ?? r.library ?? '';
  const cedola = r.cedola ?? r.cedolaNome ?? r.nCedola ?? r['N° cedola'] ?? '';
  const oldQ = r.oldQuantity ?? r.quantitaAttuale ?? r.currentQuantity ?? '';
  const newQ = r.newQuantity ?? r.qta ?? r.quantity ?? r['Pren (Qtà)'] ?? '';
  return { ean, libreria, cedola, oldQ, newQ };
}

function verificaECaricaSelezionati(){
  const ids = [...document.querySelectorAll('.ordine-check:checked')].map(c=>c.value);
  if(ids.length===0){ alert('Seleziona almeno un ordine.'); return; }
  avviaVerificaCarico(ids);

function verificaECaricaOrdine(ordine){

}
async function avviaVerificaCarico(ids){
  if(!state.rpnConnected){ showRpnToast('Accedi prima con il tuo account BookUp.', true); return; }
  const { data: ordini } = await sb.from('ordini').select('*, librerie(ragione_sociale, cod_cliente), ordini_dettaglio(*)').in('id', ids);
  if(!ordini || !ordini.length) return;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-box" style="max-width:640px">
    <h3>Verifica su RPN in corso...</h3>
    <p style="color:var(--testo-lieve);font-size:13px">Sto confrontando titoli e quantità con RPN, senza ancora caricare nulla.</p>
  </div>`;
  document.body.appendChild(overlay);
  try {
    const file = buildRpnFile(ordini);
    const result = await rpnUploadFile('upload-prenotazioni?confirmed=false', file);
    const righe = (result.saved && result.saved.length ? result.saved : result.data) || [];
    const nonConnected = result.nonConnected || [];
    renderVerificaCaricoModal(overlay, ordini, righe, nonConnected);
  } catch(e){
    overlay.remove();
    if(e.status === 428){ showRpnToast('Account RPN scollegato o token scaduto: ricollegalo da BookUp.', true); }
    else showRpnToast('Errore nella verifica: ' + e.message, true);
  }
}
function renderVerificaCaricoModal(overlay, ordini, righe, nonConnected){
  const numOrdini = ordini.map(o=>`#${o.numero_ordine}`).join(', ');
  overlay.innerHTML = `<div class="modal-box" style="max-width:640px;max-height:80vh;overflow:auto">
    <h3>Verifica prima del carico su RPN</h3>
    <p style="font-size:13px;color:var(--testo-lieve);margin-top:0">Ordini ${esc(numOrdini)} — controlla titoli e quantità, poi conferma.</p>
    ${righe.length ? `<table style="width:100%;font-size:13px"><thead><tr><th>EAN</th><th>Cliente</th><th>Cedola</th><th>Qtà attuale</th><th>Qtà nuova</th></tr></thead><tbody>
      ${righe.map(r=>{ const f = pickRpnRowFields(r); return `<tr><td>${esc(f.ean)}</td><td>${esc(f.libreria)}</td><td>${esc(f.cedola)}</td><td>${esc(f.oldQ)}</td><td><b>${esc(f.newQ)}</b></td></tr>`; }).join('')}
    </tbody></table>` : `<p>Nessuna riga riconosciuta da RPN.</p>`}
    ${nonConnected.length ? `<p style="color:var(--rosso);font-size:13px;margin-top:10px">⚠️ ${nonConnected.length} riga/righe NON agganciate su RPN (EAN, cedola o cliente da controllare): non verranno caricate.</p>` : ''}
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="ghost" style="flex:1" onclick="this.closest('.modal-overlay').remove()">Annulla</button>
      <button class="primary" style="flex:1" ${righe.length ? '' : 'disabled'} onclick='confermaCaricoRpn(${JSON.stringify(ordini.map(o=>o.id))})'>✅ Conferma e carica</button>
    </div>
  </div>`;
}
async function confermaCaricoRpn(ordineIds){
  const overlay = document.querySelector('.modal-overlay');
  const { data: ordini } = await sb.from('ordini').select('*, librerie(ragione_sociale, cod_cliente), ordini_dettaglio(*)').in('id', ordineIds);
  try {
    const file = buildRpnFile(ordini);
    const result = await rpnUploadFile('upload-prenotazioni?confirmed=true', file);
    const saved = (result.saved && result.saved.length ? result.saved : result.data) || [];
    await sb.from('ordini').update({ stato:'scaricato', scaricato_at: new Date().toISOString() }).in('id', ordineIds);
    overlay?.remove();
    showRpnToast(`✅ Caricati su RPN: ${saved.length} titoli aggiornati.`);
    renderAdminOrdiniList();
  } catch(e){
    if(e.status === 428){ showRpnToast('Account RPN scollegato o token scaduto: ricollegalo da BookUp.', true); }
    else showRpnToast('Errore durante il carico: ' + e.message, true);
  }
}

        <div id="admin-chat-inputrow" class="hidden" style="display:flex;gap:8px">
          <input id="admin-chat-input" placeholder="Scrivi una risposta..." onkeydown="if(event.key==='Enter')sendAdminChatMessage()">
          <button class="primary small" onclick="sendAdminChatMessage()">Invia</button>
        </div>
      </div>
    </div>
  `;
  await renderAdminChatList();
}
async function renderAdminChatList(){
  document.querySelectorAll('.sezioni-picker .sezione-chip').forEach((el,i)=>{
    el.classList.toggle('active', (i===0 && state.chatTab==='attive') || (i===1 && state.chatTab==='archivio'));
  });
  const cont = document.getElementById('admin-chat-libs');

  if(state.chatTab === 'attive'){
    const { data: conversazioni } = await sb.from('chat_conversazioni').select('*, librerie(ragione_sociale)').eq('stato','aperta').order('created_at', { ascending:false });
    const { data: nonLetti } = await sb.from('chat_messaggi').select('conversazione_id').eq('mittente','libreria').eq('letto_admin', false);
    const unreadMap = {};
    (nonLetti||[]).forEach(m=> unreadMap[m.conversazione_id] = (unreadMap[m.conversazione_id]||0)+1);
    cont.innerHTML = (conversazioni||[]).map(c=>`<div class="lib-chat-item ${state.chatConvId===c.id?'active':''}" onclick="openAdminConversazione('${c.id}','${c.libreria_id}')">
      <span>${esc(c.librerie?.ragione_sociale||'—')}</span>${unreadMap[c.id] ? `<span class="badge attesa">${unreadMap[c.id]}</span>`:''}
    </div>`).join('') || '<p class="empty">Nessuna chat attiva al momento.</p>';
  } else {
    const { data: conversazioni } = await sb.from('chat_conversazioni').select('*, librerie(ragione_sociale)').eq('stato','archiviata').order('archiviata_at', { ascending:false });
    cont.innerHTML = (conversazioni||[]).map(c=>`<div class="lib-chat-item ${state.chatConvId===c.id?'active':''}" onclick="openAdminConversazione('${c.id}','${c.libreria_id}',true)">
      <span>${esc(c.librerie?.ragione_sociale||'—')}</span><span style="font-size:11px;color:var(--testo-lieve)">${fmtDate(c.archiviata_at)}</span>
    </div>`).join('') || '<p class="empty">Nessuna chat archiviata.</p>';
  }
}
function resetAdminChatPannello(){
  document.getElementById('admin-chat-messages').innerHTML = '';
  document.getElementById('admin-chat-inputrow').classList.add('hidden');
  document.getElementById('admin-chat-toolbar').style.display = 'none';
}
async function openAdminConversazione(convId, libreriaId, readonly){
  state.chatConvId = convId;
  state.chatWithLibreriaId = libreriaId;
  await renderAdminChatList();
  await loadAdminChatMessages();
  document.getElementById('admin-chat-inputrow').classList.toggle('hidden', !!readonly);
  document.getElementById('admin-chat-toolbar').style.display = readonly ? 'none' : 'flex';
  if(!readonly){
    await sb.from('chat_messaggi').update({ letto_admin:true }).eq('conversazione_id', convId).eq('mittente','libreria');
    renderAdminChatList();
  }
}
async function loadAdminChatMessages(){
  const { data: msgs } = await sb.from('chat_messaggi').select('*').eq('conversazione_id', state.chatConvId).order('created_at');
  const cont = document.getElementById('admin-chat-messages');
  cont.innerHTML = (msgs||[]).map(m=>`<div class="bubble ${m.mittente}">${esc(m.testo)}<span class="time">${fmtDateTime(m.created_at)}</span></div>`).join('');
  cont.scrollTop = cont.scrollHeight;
}
async function sendAdminChatMessage(){
  const input = document.getElementById('admin-chat-input');
  const testo = input.value.trim();
  if(!testo || !state.chatConvId) return;
  await sb.from('chat_messaggi').insert({ libreria_id: state.chatWithLibreriaId, conversazione_id: state.chatConvId, mittente:'admin', testo });
  input.value = '';
  await loadAdminChatMessages();
}
async function archiviaChatCorrente(){
  if(!state.chatConvId) return;
  if(!confirm('Archiviare questa conversazione? Se la libreria scrive di nuovo, si aprirà una nuova chat.')) return;
  await sb.from('chat_conversazioni').update({ stato:'archiviata', archiviata_at: new Date().toISOString() }).eq('id', state.chatConvId);
  state.chatConvId = null;
  renderAdminChatList();
}

/* ================= CHAT LIBRAIO ================= */
function toggleChat(){
  document.getElementById('chat-panel').classList.toggle('hidden');
  if(!document.getElementById('chat-panel').classList.contains('hidden')) loadLibraioChatMessages();
}
async function loadLibraioChatMessages(){
  const conv = await getConversazioneAperta(state.libreria.id);
  state.chatConversazioneLibraio = conv;
  const cont = document.getElementById('chat-messages');
  if(!conv){
    cont.innerHTML = '<p style="text-align:center;color:var(--testo-lieve);font-size:13px;padding:26px 10px">Nessun messaggio. Scrivi qui sotto per iniziare una conversazione con PDE.</p>';
    document.getElementById('chat-badge').classList.add('hidden');
    return;
  }
  const { data: msgs } = await sb.from('chat_messaggi').select('*').eq('conversazione_id', conv.id).order('created_at');
  cont.innerHTML = (msgs||[]).map(m=>`<div class="bubble ${m.mittente}">${esc(m.testo)}<span class="time">${fmtDateTime(m.created_at)}</span></div>`).join('');
  cont.scrollTop = cont.scrollHeight;
  await sb.from('chat_messaggi').update({ letto_libreria:true }).eq('conversazione_id', conv.id).eq('mittente','admin');
  document.getElementById('chat-badge').classList.add('hidden');
}
async function sendChatMessage(){
  const input = document.getElementById('chat-input');
  const testo = input.value.trim();
  if(!testo) return;
  const conv = await getOrCreateConversazioneAperta(state.libreria.id);
  if(!conv){ alert('Errore avvio conversazione, riprova.'); return; }
  await sb.from('chat_messaggi').insert({ libreria_id: state.libreria.id, conversazione_id: conv.id, mittente:'libreria', testo });
  input.value = '';
  await loadLibraioChatMessages();
}
function subscribeChat(libreriaId){
  state.chatChannel = sb.channel('chat-'+libreriaId)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'chat_messaggi', filter:`libreria_id=eq.${libreriaId}` }, payload => {
      if(payload.new.mittente === 'admin'){
        if(document.getElementById('chat-panel').classList.contains('hidden')){
          document.getElementById('chat-badge').classList.remove('hidden');
        } else {
          loadLibraioChatMessages();
        }
      }
    }).subscribe();
}

function closeAllFloating(){
  document.getElementById('cart-panel').classList.add('hidden');
  document.getElementById('chat-panel').classList.add('hidden');
}
</script>
